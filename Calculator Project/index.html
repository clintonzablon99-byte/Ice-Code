<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculator">
     <input type="text" id="input" placeholder="0" readonly>
    <div class="buttons-container">
        <button class="opperator">AC</button>
        <button class="opperator">DEL</button>
        <button class="opperator">%</button>
        <button class="opperator">/</button>
    
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="opperator">*</button>

        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="opperator">-</button>
    
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="opperator">+</button>


        <button>00</button>
        <button>.</button>
        <button>0</button>
        <button class="opperatorZ">=</button>
    </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
